name: QA Pipeline Test

on:
  push:
    branches: ["main"]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  run-qa:
    # Only run when the commit message contains [qa]
    if: contains(github.event.head_commit.message, '[qa]')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Log into registry ${{ env.REGISTRY }}
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull Docker image
        run: |
          docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:main

      - name: Run tractography pipeline on downsampled test data
        run: |
          docker run --rm \
            -v ${{ github.workspace }}/data:/data \
            -v /tmp/work:/work \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:main \
            /data/WAND-downsampled \
            /data/WAND-downsampled/derivatives \
            --participant-label 00395 \
            --session-label 02 \
            --bids-filter-file /data/bids_filter.json \
            --work-dir /work \
            --n-threads 2 \
            --parcellation-file /data/schaefer2018_100parcels_7networks_5mm.nii.gz \
            --labels-file /data/Schaefer2018_100Parcels_7Networks_order.txt \
            --n-streamlines 10000

      - name: Deploy output to GitHub Pages
        if: always()
        run: |
          OUTPUT_DIR="${{ github.workspace }}/data/WAND-downsampled/derivatives/diffusion_tractography"
          mkdir -p "$OUTPUT_DIR"
          sudo apt-get install -y tree -qq

          # Checkout gh-pages branch into a separate directory
          git fetch origin gh-pages
          git worktree add /tmp/gh-pages gh-pages

          # Copy pipeline output into gh-pages root
          DEST="/tmp/gh-pages"
          cp -r "$OUTPUT_DIR"/. "$DEST/" || true

          # Generate index.html at the root of gh-pages
          tree -H '.' -T 'QA Output — ${{ github.sha }}' \
            "$DEST" > /tmp/index.html || true
          mv /tmp/index.html "$DEST/index.html"

          # Commit and push to gh-pages
          cd /tmp/gh-pages
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add .
          git commit -m "QA output for ${{ github.sha }}" || true
          git push origin gh-pages

      - name: Print GitHub Pages URL
        if: always()
        run: |
          echo "QA output published at:"
          echo "https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/"

      - name: Upload pipeline outputs as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qa-output-${{ github.sha }}
          path: ${{ github.workspace }}/data/WAND-downsampled/derivatives/diffusion_tractography
          retention-days: 7
